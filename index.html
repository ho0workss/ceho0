<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>ceho0 — 종목 추천 대시보드</title>
  <meta name="description" content="뉴스·차트·펀더멘털 지표와 몬테카를로 시뮬레이션 기반 종목 추천 대시보드. 당일·1주·1개월·장기 전략별 매수/매도 계획, 배당·세후 실수령 계산, 추천 히스토리 자동 기록.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="viz-root">
  <div class="wrap">
    <header class="site">
      <h1>📈 종목 추천 대시보드</h1>
      <p class="sub">뉴스 · 차트 · 펀더멘털 지표와 몬테카를로 시뮬레이션(20,000 경로)을 결합한 기간별 매매 전략</p>
      <span class="asof" id="asof"></span>
      <p class="disclaimer" id="disclaimer"></p>
    </header>

    <nav class="viewtabs" aria-label="보기 선택">
      <button type="button" data-view="reco" aria-selected="true">추천 종목</button>
      <button type="button" data-view="history" aria-selected="false">히스토리</button>
      <button type="button" data-view="tax" aria-selected="false">세금 가이드</button>
    </nav>

    <section id="view-reco">
      <div class="filters" role="group" aria-label="필터">
        <div class="seg" id="hseg" role="group" aria-label="투자 기간">
          <button type="button" data-h="all" aria-pressed="true">전체</button>
          <button type="button" data-h="day" aria-pressed="false">당일</button>
          <button type="button" data-h="week" aria-pressed="false">1주일</button>
          <button type="button" data-h="month" aria-pressed="false">1개월</button>
          <button type="button" data-h="long" aria-pressed="false">장기</button>
        </div>
        <select id="market" aria-label="시장">
          <option value="all">시장 전체</option>
          <option value="US">미국</option>
          <option value="KR">한국</option>
        </select>
        <select id="risk" aria-label="리스크">
          <option value="all">리스크 전체</option>
          <option value="low">낮음</option>
          <option value="mid">중간</option>
          <option value="high">높음</option>
          <option value="veryhigh">매우 높음</option>
        </select>
        <label class="chk"><input type="checkbox" id="divonly"> 배당주만</label>
        <span class="count" id="count"></span>
      </div>
      <p class="hist-note" style="margin-bottom:0.9rem">배치: <strong id="batchchip"></strong> — 카드를 클릭하면 매매 계획 · 시뮬레이션 · 판단 근거 · 배당 · 세후 계산기를 볼 수 있습니다.</p>
      <div class="grid" id="cards"></div>
    </section>

    <section id="history" style="display:none"></section>
    <section id="tax" style="display:none"></section>

    <footer class="site">
      <p>ho0workss/ceho0 · GitHub 푸시 시 Vercel 자동 배포 · 데이터 출처: CNBC, TheStreet, MacroTrends, TradingKey, Investing.com, stockanalysis.com 외 (2026-07-06~08 수집)</p>
    </footer>
  </div>

  <div class="modal-back" id="modal-back" role="dialog" aria-modal="true">
    <div class="modal"></div>
  </div>

  <script src="data.js"></script>
  <script src="data/sim.js"></script>
  <script src="app.js"></script>
</body>
</html>
