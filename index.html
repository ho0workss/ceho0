<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ceho0 — 자동 배포 파이프라인</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #1a1d21;
      --text-muted: #5c6470;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --ok: #16a34a;
      --ok-soft: #dcfce7;
      --border: #e4e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --surface: #181b21;
        --text: #e8eaed;
        --text-muted: #9aa3af;
        --accent: #60a5fa;
        --accent-soft: #1e3a5f;
        --ok: #4ade80;
        --ok-soft: #14351f;
        --border: #2a2e36;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      line-height: 1.6;
    }
    main { max-width: 640px; width: 100%; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--ok-soft);
      color: var(--ok);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }
    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
    }
    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 2.5rem;
    }
    .pipeline {
      display: flex;
      align-items: stretch;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .step {
      flex: 1 1 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1rem;
      text-align: center;
    }
    .step .icon { font-size: 1.6rem; margin-bottom: 0.5rem; }
    .step .name { font-weight: 600; font-size: 0.95rem; }
    .step .desc { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem; }
    footer {
      margin-top: 2.5rem;
      color: var(--text-muted);
      font-size: 0.82rem;
      text-align: center;
    }
    footer code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.1rem 0.4rem;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <main>
    <span class="badge">배포 파이프라인 가동 중</span>
    <h1>ceho0</h1>
    <p class="subtitle">요청 → GitHub 커밋 → Vercel 배포까지 자동으로 이어지는 웹 배포 파이프라인이 준비되었습니다.</p>
    <div class="pipeline">
      <div class="step">
        <div class="icon">💬</div>
        <div class="name">요청</div>
        <div class="desc">만들고 싶은 것을 말하면</div>
      </div>
      <div class="step">
        <div class="icon">📦</div>
        <div class="name">GitHub</div>
        <div class="desc">코드로 구현해 커밋·푸시</div>
      </div>
      <div class="step">
        <div class="icon">🚀</div>
        <div class="name">Vercel</div>
        <div class="desc">웹페이지로 즉시 배포</div>
      </div>
    </div>
    <footer>
      <code>ho0workss/ceho0</code> 저장소에서 자동 배포됩니다.
    </footer>
  </main>
</body>
</html>
